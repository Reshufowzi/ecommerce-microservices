version: '3'

services:

  mysql-user:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: userdb

  mysql-product:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productdb

  mysql-payment:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paymentdb

  redis:
    image: redis:latest

  user-service:
    build: ./user-service
    ports:
      - "8081:8080"
    depends_on:
      - mysql-user

  product-service:
    build: ./product-service
    ports:
      - "8082:8080"
    depends_on:
      - mysql-product

  cart-service:
    build: ./cart-service
    ports:
      - "8083:8080"
    depends_on:
      - redis

  payment-service:
    build: ./payment-service
    ports:
      - "8084:8080"
    depends_on:
      - mysql-payment

  frontend:
    build: ./frontend
    ports:
      - "80:80"
