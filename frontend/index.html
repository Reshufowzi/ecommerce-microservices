<h1>E-Commerce</h1>

<button onclick="loadProducts()">Products</button>
<ul id="list"></ul>

<script>
function loadProducts() {
 fetch("http://localhost:8082/products")
 .then(res => res.json())
 .then(data => {
   let list = document.getElementById("list");
   list.innerHTML="";
   data.forEach(p=>{
     let li=document.createElement("li");
     li.innerText=p.name + " - " + p.price;
     list.appendChild(li);
   });
 });
}
</script>
